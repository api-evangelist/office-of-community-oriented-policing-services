description: >-
  The Office of Community Oriented Policing Services (COPS Office) is a component
  of the U.S. Department of Justice that works to advance the practice of community
  policing in law enforcement agencies across the country. The COPS Office provides
  grants, resources, and technical assistance to help law enforcement agencies develop
  and implement community policing strategies that build trust and collaboration with
  the communities they serve.
